<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="assets/logo.png">
  <title>Pluvia</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-[url('/assets/weather.jpg')] bg-cover bg-center min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-white rounded-2xl p-4 shadow-xl">

    <!-- Logo -->
    <div class="flex gap-2 justify-center items-center font-bold text-xl md:text-2xl">
      <img class="h-6 w-6 md:h-7 md:w-7" src="assets/logo.png">
      Pluvia
    </div>

    <!-- Search -->
    <div class="flex flex-col md:flex-row justify-center items-center mt-6 gap-3">

      <input 
        id="Input" 
        class="w-full border-2 border-black rounded-xl p-2 text-md transition duration-300 ease-in-out 
        focus:shadow-lg"
        type="text" 
        placeholder="Enter a city name..."
      > 
      
      <button 
        id="Search" 
        class="w-full md:w-[60px] cursor-pointer rounded-xl text-2xl bg-gray-400 p-2 transition duration-300 ease-in-out 
        hover:bg-blue-600"
      >
        🌤️
      </button>

    </div>

    <!-- Weather Data -->
    <div id="weaData" class="mt-4 text-center"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
