<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/logo.png">
  <title>Pluvia</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
  input {
    background: transparent !important;
  }

  input:-webkit-autofill {
    -webkit-box-shadow: 0 0 0 1000px transparent inset !important;
    -webkit-text-fill-color: whitesmoke !important;
    transition: background-color 5000s ease-in-out 0s;
  }
</style>
</head>

<body class="bg-[url('/assets/weather.jpg')] bg-cover bg-center min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md backdrop-blur-lg bg-white/0 rounded-2xl p-4 shadow-xl">

    <!-- Logo -->
    <div class="flex gap-2 justify-center text-white items-center font-bold text-xl md:text-2xl">
      <img class="h-6 w-6 md:h-7 md:w-7" src="assets/logo.png">
      Pluvia
    </div>

    <!-- Search -->
    <div class="flex flex-col md:flex-row justify-center items-center mt-6 gap-3">

      <input 
        id="Input" 
        class="w-full border border-white/50 rounded-xl p-2 text-white bg-transparent outline-none"
        type="text" 
        placeholder="Enter a city name..."
      > 
      
      <button 
        id="Search" 
        class="w-full md:w-[140px] cursor-pointer text-black rounded-xl text-lg flex justify-center bg-blue-500 p-2
        hover:bg-blue-600"
      >
        Search
      </button>

    </div>

    <!-- Weather Data -->
    <div id="weaData" class="mt-4 text-center"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
